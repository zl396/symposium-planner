<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duke Nicholas School — Spring Symposium 2026 Schedule Planner</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f6fa; --card: #fff; --text: #1a1a2e; --muted: #6b7280;
  --accent: #003366; --accent-light: #e8eef6; --border: #e2e5ea;
  --green: #059669; --red: #dc2626; --orange: #d97706;
  --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,.08);
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
a { color: var(--accent); }

/* Header */
.header { background: var(--accent); color: #fff; padding: 1.25rem 1.5rem; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 1.25rem; font-weight: 600; }
.header p { font-size: .85rem; opacity: .8; margin-top: .2rem; }

/* Layout */
.container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
.toolbar { display: flex; gap: .75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
.toolbar .btn { padding: .45rem 1rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); cursor: pointer; font-size: .85rem; transition: .15s; }
.toolbar .btn:hover { background: var(--accent-light); }
.toolbar .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar .btn-export { background: var(--green); color: #fff; border-color: var(--green); }
.toolbar .btn-export:hover { opacity: .9; }

/* Dropdown */
.dropdown { position: relative; display: inline-block; }
.dropdown-menu { display: none; position: absolute; top: 100%; left: 0; margin-top: .3rem; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 4px 12px rgba(0,0,0,.12); z-index: 50; min-width: 200px; overflow: hidden; }
.dropdown-menu.open { display: block; }
.dropdown-menu button { display: block; width: 100%; padding: .55rem .9rem; border: none; background: none; text-align: left; font-size: .85rem; cursor: pointer; color: var(--text); }
.dropdown-menu button:hover { background: var(--accent-light); }

/* Filters */
.filters { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
.filters h3 { font-size: .9rem; margin-bottom: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
.filter-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: .75rem; }
.filter-group { display: flex; flex-direction: column; gap: .3rem; min-width: 180px; flex: 1; }
.filter-group label { font-size: .8rem; font-weight: 600; color: var(--muted); }
.filter-group select, .filter-group input { padding: .4rem .6rem; border: 1px solid var(--border); border-radius: var(--radius); font-size: .85rem; background: #fff; }
.filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,51,102,.15); }
.filter-tags { display: flex; gap: .4rem; flex-wrap: wrap; margin-top: .5rem; }
.filter-tag { display: inline-flex; align-items: center; gap: .3rem; background: var(--accent-light); color: var(--accent); padding: .2rem .6rem; border-radius: 20px; font-size: .78rem; }
.filter-tag button { background: none; border: none; cursor: pointer; font-size: .9rem; color: var(--accent); line-height: 1; }
.clear-all { font-size: .8rem; color: var(--red); cursor: pointer; background: none; border: none; text-decoration: underline; }

/* Stats bar */
.stats { font-size: .85rem; color: var(--muted); margin-bottom: .75rem; display: flex; justify-content: space-between; align-items: center; }

/* Cards */
.cards { display: flex; flex-direction: column; gap: .6rem; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem 1.1rem; box-shadow: var(--shadow); transition: .15s; position: relative; }
.card:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.card.in-schedule { border-left: 4px solid var(--green); }
.card.has-conflict { border-left: 4px solid var(--orange); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: .75rem; }
.card-meta { display: flex; gap: .6rem; flex-wrap: wrap; font-size: .78rem; color: var(--muted); margin-top: .35rem; }
.card-meta span { display: inline-flex; align-items: center; gap: .2rem; }
.card-title { font-size: .95rem; font-weight: 600; margin-top: .4rem; }
.card-presenters { font-size: .85rem; color: var(--muted); margin-top: .2rem; }
.card-advisor { font-size: .82rem; margin-top: .2rem; }
.card-advisor strong { color: var(--muted); }
.program-badge { display: inline-block; padding: .1rem .5rem; border-radius: 12px; font-size: .72rem; font-weight: 600; color: #fff; }
.card-actions { display: flex; gap: .5rem; margin-top: .5rem; }
.card-actions button { padding: .3rem .7rem; border-radius: var(--radius); font-size: .78rem; cursor: pointer; border: 1px solid var(--border); background: var(--card); transition: .15s; }
.card-actions button:hover { background: var(--accent-light); }
.card-actions .btn-add { border-color: var(--green); color: var(--green); }
.card-actions .btn-add:hover { background: #ecfdf5; }
.card-actions .btn-remove { border-color: var(--red); color: var(--red); }
.card-actions .btn-remove:hover { background: #fef2f2; }
.card-actions .btn-abstract { border-color: var(--accent); color: var(--accent); }
.card-actions .btn-zoom { border-color: #2563eb; color: #2563eb; }
.card-actions .btn-zoom:hover { background: #eff6ff; }
.conflict-warn { display: inline-flex; align-items: center; gap: .25rem; background: #fef3c7; color: var(--orange); padding: .15rem .5rem; border-radius: 12px; font-size: .72rem; font-weight: 600; margin-top: .35rem; }

/* Day separator */
.day-separator { background: var(--accent); color: #fff; padding: .5rem 1rem; border-radius: var(--radius); font-weight: 600; font-size: .9rem; margin-top: .5rem; }

/* Empty state */
.empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty p { font-size: 1.1rem; }

/* Timeline View */
.timeline { margin-bottom: 1.5rem; }
.timeline-day { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 1rem; overflow: hidden; }
.timeline-day-header { background: var(--accent); color: #fff; padding: .5rem 1rem; font-weight: 600; font-size: .9rem; }
.timeline-grid { position: relative; display: grid; min-height: 60px; }
.timeline-hour-labels { display: flex; flex-direction: column; background: #f9fafb; border-right: 1px solid var(--border); min-width: 70px; }
.timeline-hour-label { font-size: .72rem; color: var(--muted); padding: 0 .5rem; text-align: right; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; justify-content: flex-end; padding-top: 2px; }
.timeline-body { position: relative; flex: 1; min-height: 60px; }
.timeline-row { display: flex; border-bottom: 1px solid #f0f0f0; }
.timeline-slot { position: relative; flex: 1; min-height: 32px; border-right: 1px solid #f0f0f0; }
.timeline-slot:last-child { border-right: none; }
.timeline-loc-headers { display: flex; border-bottom: 2px solid var(--border); background: #f9fafb; }
.timeline-loc-header { flex: 1; padding: .3rem .4rem; font-size: .68rem; font-weight: 600; color: var(--muted); text-align: center; border-right: 1px solid #f0f0f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.timeline-loc-header:last-child { border-right: none; }
.tl-block { position: absolute; border-radius: 4px; padding: .25rem .4rem; font-size: .7rem; overflow: hidden; cursor: pointer; border: 1px solid rgba(0,0,0,.1); transition: .15s; z-index: 1; min-height: 28px; display: flex; flex-direction: column; justify-content: center; }
.tl-block:hover { box-shadow: 0 2px 8px rgba(0,0,0,.18); z-index: 10; transform: scale(1.02); }
.tl-block.has-conflict { outline: 2px solid var(--orange); outline-offset: -1px; }
.tl-block-title { font-weight: 600; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tl-block-meta { font-size: .65rem; opacity: .85; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-block-actions { display: none; position: absolute; top: 100%; left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); padding: .3rem; box-shadow: 0 4px 12px rgba(0,0,0,.15); z-index: 20; }
.tl-block:hover .tl-block-actions { display: flex; gap: .3rem; flex-wrap: wrap; }
.tl-block-actions button { padding: .2rem .4rem; border-radius: 4px; font-size: .68rem; cursor: pointer; border: 1px solid var(--border); background: #fff; transition: .1s; white-space: nowrap; }
.tl-block-actions .btn-remove { border-color: var(--red); color: var(--red); }
.tl-block-actions .btn-abstract { border-color: var(--accent); color: var(--accent); }
.tl-block-actions .btn-zoom { border-color: #2563eb; color: #2563eb; }
.timeline-legend { display: flex; gap: 1rem; flex-wrap: wrap; padding: .5rem 0; font-size: .75rem; color: var(--muted); margin-bottom: .5rem; }
.timeline-legend-item { display: inline-flex; align-items: center; gap: .3rem; }
.timeline-legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
.timeline-empty-day { padding: 1.5rem; text-align: center; color: var(--muted); font-size: .9rem; }
.timeline-time-labels { position: relative; min-width: 65px; background: #f9fafb; border-right: 1px solid var(--border); }
.timeline-time-label { position: absolute; right: .4rem; font-size: .68rem; color: var(--muted); transform: translateY(-50%); white-space: nowrap; }
.timeline-cols { position: relative; flex: 1; display: flex; }
.timeline-col { flex: 1; position: relative; border-right: 1px solid #f0f0f0; }
.timeline-col:last-child { border-right: none; }
.timeline-hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid #f0f0f0; }
.timeline-hour-line.on-hour { border-top-style: dashed; border-top-color: #d1d5db; }
.timeline-now-line { position: absolute; left: 0; right: 0; border-top: 2px solid var(--red); z-index: 5; }
.timeline-now-label { position: absolute; right: 0; top: -9px; background: var(--red); color: #fff; font-size: .6rem; padding: 0 .3rem; border-radius: 3px; }

/* Print */
@media print {
  .header, .filters, .toolbar, .card-actions, .stats, .tl-block-actions { display: none !important; }
  .timeline-day { break-inside: avoid; }
  .container { max-width: 100%; padding: 0; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; margin-bottom: .5rem; }
  .day-separator { background: #333 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .program-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body::before { content: "Duke Nicholas School — Spring Symposium 2026"; display: block; font-size: 1.2rem; font-weight: bold; text-align: center; margin: 1rem 0; }
}

/* Responsive */
@media (max-width: 640px) {
  .filter-row { flex-direction: column; }
  .filter-group { min-width: 100%; }
  .toolbar { flex-direction: column; align-items: stretch; }
  .timeline-loc-header { font-size: .6rem; padding: .2rem; }
  .timeline-time-labels { min-width: 50px; }
  .tl-block { font-size: .62rem; padding: .15rem .25rem; }
  .tl-block-meta { display: none; }
}
</style>

// ==================== TIME HELPERS ====================
const DAY_NAMES = {'2026-04-07':'Tue, Apr 7','2026-04-08':'Wed, Apr 8','2026-04-09':'Thu, Apr 9','2026-04-10':'Fri, Apr 10'};

function parseTime(t) {
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return 0;
  let h = parseInt(m[1]); const min = parseInt(m[2]); const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

function getTimePeriod(t) {
  const mins = parseTime(t);
  if (mins < 720) return 'morning';
  if (mins < 1020) return 'afternoon';
  return 'evening';
}

function sortKey(item) {
  return item.date + '-' + String(parseTime(item.time)).padStart(4,'0');
}

function populateFilters() {
  const dates = [...new Set(DATA.map(d => d.date))].sort();
  const locations = [...new Set(DATA.map(d => d.location))].sort();
  const timeSlots = [...new Set(DATA.map(d => d.time))].sort((a, b) => parseTime(a) - parseTime(b));
  const advisors = new Set();
  DATA.forEach(d => d.advisors.split(/,\s*/).forEach(a => { if (a.trim()) advisors.add(a.trim()); }));
  const presenters = new Set();
  DATA.forEach(d => d.presenters.split(/,\s*/).forEach(p => { if (p.trim()) presenters.add(p.trim()); }));

  const fDate = document.getElementById('filterDate');
  dates.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = DAY_NAMES[d] || d; fDate.appendChild(o); });

  const fTime = document.getElementById('filterTime');
  timeSlots.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; fTime.appendChild(o); });

  const fLoc = document.getElementById('filterLocation');
  locations.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; fLoc.appendChild(o); });

  // Concentration filters with optgroup
  const CONC_GROUPS = [
    { label: 'MEM Concentrations', items: ['EE','EAM','BE','CEEJ','EEP','EEH','CaMS','TFE'] },
    { label: 'Other Master\'s', items: ['DEL','iMEP','MF'] },
    { label: 'Joint Degrees', items: ['MBA','MPP'] },
    { label: 'Undergraduate', items: ['ENV','MARSCI','BIO','GWD'] }
  ];
  const CONC_LABELS = {
    EE:'Energy & Environment', EAM:'Env Analytics & Modeling', BE:'Business & Environment',
    CEEJ:'Community & Env Justice', EEP:'Env Economics & Policy', EEH:'Ecotox & Env Health',
    CaMS:'Coastal & Marine Systems', TFE:'Terrestrial & Freshwater',
    DEL:'Duke Env Leadership (Online)', iMEP:'Int\'l Master of Env Policy', MF:'Master of Forestry',
    MBA:'MBA (Fuqua)', MPP:'MPP (Sanford)',
    ENV:'Env Sciences & Policy', MARSCI:'Marine Science & Conservation', BIO:'Biology', GWD:'Graduation w/ Distinction'
  };
  function populateConcentrationSelect(selectEl) {
    CONC_GROUPS.forEach(g => {
      const og = document.createElement('optgroup');
      og.label = g.label;
      g.items.forEach(code => {
        const o = document.createElement('option');
        o.value = code;
        o.textContent = code + ' — ' + (CONC_LABELS[code] || code);
        og.appendChild(o);
      });
      selectEl.appendChild(og);

  }
  populateConcentrationSelect(document.getElementById('filterPrimary'));
  populateConcentrationSelect(document.getElementById('filterSecondary'));

  const fAdv = document.getElementById('filterAdvisor');
  [...advisors].sort().forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; fAdv.appendChild(o); });

  const fPres = document.getElementById('filterPresenter');
  [...presenters].sort().forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; fPres.appendChild(o); });

function getActiveFilters() {
  const f = {};
  const date = document.getElementById('filterDate').value;
  const time = document.getElementById('filterTime').value;
  const loc = document.getElementById('filterLocation').value;
  const primary = document.getElementById('filterPrimary').value;
  const secondary = document.getElementById('filterSecondary').value;
  const adv = document.getElementById('filterAdvisor').value;
  const pres = document.getElementById('filterPresenter').value;
  const kw = document.getElementById('filterKeyword').value.trim().toLowerCase();
  if (date) f.date = date;
  if (time) f.time = time;
  if (loc) f.location = loc;
  if (primary) f.primary = primary;
  if (secondary) f.secondary = secondary;
  if (adv) f.advisor = adv;
  if (pres) f.presenter = pres;
  if (kw) f.keyword = kw;
  return f;
}

function matchesFilters(item, filters) {
  if (filters.date && item.date !== filters.date) return false;
  if (filters.time && item.time !== filters.time) return false;
  if (filters.location && item.location !== filters.location) return false;
  if (filters.primary || filters.secondary) {
    // Each student's program is like "EE-EAM/MBA". Split by comma for multi-presenter.
    // For each program entry, parse: parts[0]=primary, parts[1]=secondary (before /), after /=joint
    const progs = item.program.split(/,\s*/);
    const match = progs.some(p => {
      const clean = p.trim();
      const slashParts = clean.split('/');
      const concParts = slashParts[0].split('-');
      const jointParts = slashParts.slice(1);
      const pri = concParts[0] || '';
      const sec = concParts[1] || '';
      const all = [...concParts, ...jointParts];
      if (filters.primary && pri !== filters.primary && !all.includes(filters.primary)) return false;
      if (filters.secondary && sec !== filters.secondary && !all.includes(filters.secondary)) return false;
      return true;
    });
    if (!match) return false;
  }
  if (filters.advisor) {
    const advs = item.advisors.split(/,\s*/);
    if (!advs.some(a => a.trim() === filters.advisor)) return false;
  }
  if (filters.presenter) {
    const pres = item.presenters.split(/,\s*/);
    if (!pres.some(p => p.trim() === filters.presenter)) return false;
  }
  if (filters.keyword) {
    const hay = (item.title + ' ' + item.presenters + ' ' + item.advisors + ' ' + item.program).toLowerCase();
    if (!hay.includes(filters.keyword)) return false;
  }
  return true;
}

// ==================== CONFLICT DETECTION ====================
function getConflicts() {
  const slots = {};
  mySchedule.forEach(id => {
    const item = DATA.find(d => d.id === id);
    if (!item) return;
    const key = item.date + '|' + item.time;
    if (!slots[key]) slots[key] = [];
    slots[key].push(id);
  });
  const conflictIds = new Set();
  Object.values(slots).forEach(ids => {
    if (ids.length > 1) ids.forEach(id => conflictIds.add(id));
  });
  return conflictIds;
}

// ==================== RENDER ====================
function renderFilterTags() {
  const container = document.getElementById('filterTags');
  while (container.firstChild) container.removeChild(container.firstChild);
  const filters = getActiveFilters();
  const labels = {date: 'Date', time: 'Time Slot', location: 'Location', primary: 'Primary', secondary: 'Secondary', advisor: 'Advisor', presenter: 'Presenter', keyword: 'Keyword'};
  const displayVal = {date: v => DAY_NAMES[v] || v};
  Object.entries(filters).forEach(([key, val]) => {
    const tag = document.createElement('span');
    tag.className = 'filter-tag';
    const text = document.createElement('span');
    text.textContent = labels[key] + ': ' + (displayVal[key] ? displayVal[key](val) : val);
    const btn = document.createElement('button');
    btn.textContent = '\u00d7';
    btn.addEventListener('click', () => {
      if (key === 'keyword') document.getElementById('filterKeyword').value = '';
      else document.getElementById('filter' + key.charAt(0).toUpperCase() + key.slice(1)).value = '';
      render();
    });
    tag.appendChild(text);
    tag.appendChild(btn);
    container.appendChild(tag);
  });
}

// ==================== TIMELINE VIEW ====================
const SLOT_DURATION = 25; // minutes per session
const PX_PER_MIN = 2.2;

function renderTimeline(items, conflicts) {
  const tl = document.getElementById('timelineContainer');
  while (tl.firstChild) tl.removeChild(tl.firstChild);

  if (items.length === 0) {
    tl.style.display = 'none';
    return;
  }
  tl.style.display = 'block';

  // Group by date
  const byDate = {};
  items.forEach(d => {
    if (!byDate[d.date]) byDate[d.date] = [];
    byDate[d.date].push(d);
  });

  // Legend
  const legend = document.createElement('div');
  legend.className = 'timeline-legend';
  const seenProgs = new Set();
  items.forEach(d => {
    const p = d.program.split(/[-,\/]/)[0].trim();
    if (!seenProgs.has(p)) {
      seenProgs.add(p);
      const li = document.createElement('span');
      li.className = 'timeline-legend-item';
      const sw = document.createElement('span');
      sw.className = 'timeline-legend-swatch';
      sw.style.backgroundColor = PROGRAM_COLORS[p] || '#6b7280';
      li.appendChild(sw);
      li.appendChild(document.createTextNode(p));
      legend.appendChild(li);
    }
  });
  tl.appendChild(legend);

  Object.keys(byDate).sort().forEach(date => {
    const dayItems = byDate[date];
    const dayDiv = document.createElement('div');
    dayDiv.className = 'timeline-day';

    // Day header
    const header = document.createElement('div');
    header.className = 'timeline-day-header';
    header.textContent = DAY_NAMES[date] || date;
    dayDiv.appendChild(header);

    if (dayItems.length === 0) {
      const emptyDay = document.createElement('div');
      emptyDay.className = 'timeline-empty-day';
      emptyDay.textContent = 'No sessions scheduled';
      dayDiv.appendChild(emptyDay);
      tl.appendChild(dayDiv);
      return;
    }

    // Find time range and locations for this day
    const locations = [...new Set(dayItems.map(d => d.location))].sort();
    const times = dayItems.map(d => parseTime(d.time));
    const minTime = Math.floor(Math.min(...times) / 30) * 30; // round down to 30min
    const maxTime = Math.ceil((Math.max(...times) + SLOT_DURATION) / 30) * 30; // round up
    const totalMinutes = maxTime - minTime;
    const totalHeight = totalMinutes * PX_PER_MIN;

    // Location headers
    const locHeaders = document.createElement('div');
    locHeaders.className = 'timeline-loc-headers';
    // Spacer for time label column
    const spacer = document.createElement('div');
    spacer.className = 'timeline-loc-header';
    spacer.style.minWidth = '65px';
    spacer.style.maxWidth = '65px';
    spacer.style.flex = 'none';
    spacer.textContent = '';
    locHeaders.appendChild(spacer);
    locations.forEach(loc => {
      const lh = document.createElement('div');
      lh.className = 'timeline-loc-header';
      lh.textContent = loc.replace(', Grainger Hall', '').replace(', LSRC', ' (LSRC)');
      lh.title = loc;
      locHeaders.appendChild(lh);
    });
    dayDiv.appendChild(locHeaders);

    // Grid area: time labels + columns
    const gridWrap = document.createElement('div');
    gridWrap.style.display = 'flex';
    gridWrap.style.position = 'relative';
    gridWrap.style.height = totalHeight + 'px';

    // Time labels
    const timeLabels = document.createElement('div');
    timeLabels.className = 'timeline-time-labels';
    timeLabels.style.height = totalHeight + 'px';

    for (let t = minTime; t <= maxTime; t += 30) {
      const y = (t - minTime) * PX_PER_MIN;
      const label = document.createElement('div');
      label.className = 'timeline-time-label';
      label.style.top = y + 'px';
      let h = Math.floor(t / 60);
      const m = t % 60;
      const ap = h >= 12 ? 'PM' : 'AM';
      if (h > 12) h -= 12;
      if (h === 0) h = 12;
      label.textContent = h + ':' + String(m).padStart(2,'0') + ' ' + ap;
      timeLabels.appendChild(label);

      // Hour line across all columns
      const line = document.createElement('div');
      line.className = 'timeline-hour-line' + (m === 0 ? ' on-hour' : '');
      line.style.position = 'absolute';
      line.style.top = y + 'px';
      line.style.left = '65px';
      line.style.right = '0';
      gridWrap.appendChild(line);
    }
    gridWrap.appendChild(timeLabels);

    // Columns for each location
    const colsWrap = document.createElement('div');
    colsWrap.className = 'timeline-cols';
    colsWrap.style.height = totalHeight + 'px';

    locations.forEach(loc => {
      const col = document.createElement('div');
      col.className = 'timeline-col';

      const locItems = dayItems.filter(d => d.location === loc);
      locItems.forEach(item => {
        const startMin = parseTime(item.time);
        const top = (startMin - minTime) * PX_PER_MIN;
        const height = SLOT_DURATION * PX_PER_MIN;

        const block = document.createElement('div');
        block.className = 'tl-block';
        if (conflicts.has(item.id)) block.classList.add('has-conflict');

        const bgColor = getProgramColor(item.program);
        block.style.backgroundColor = bgColor + '20';
        block.style.borderLeftColor = bgColor;
        block.style.borderLeftWidth = '3px';
        block.style.top = top + 'px';
        block.style.height = height + 'px';
        block.style.left = '3px';
        block.style.right = '3px';

        const title = document.createElement('div');
        title.className = 'tl-block-title';
        title.textContent = item.title;
        title.style.color = bgColor;
        block.appendChild(title);

        const meta = document.createElement('div');
        meta.className = 'tl-block-meta';
        meta.textContent = item.time + ' \u00B7 ' + item.presenters;
        block.appendChild(meta);

        // Hover actions
        const actions = document.createElement('div');
        actions.className = 'tl-block-actions';

        const btnRm = document.createElement('button');
        btnRm.className = 'btn-remove';
        btnRm.textContent = 'Remove';
        btnRm.addEventListener('click', (e) => { e.stopPropagation(); mySchedule.delete(item.id); render(true); });
        actions.appendChild(btnRm);

        if (item.abstract) {
          const btnAbs = document.createElement('button');
          btnAbs.className = 'btn-abstract';
          btnAbs.textContent = 'Abstract';
          btnAbs.addEventListener('click', (e) => { e.stopPropagation(); window.open(item.abstract, '_blank', 'noopener,noreferrer'); });
          actions.appendChild(btnAbs);
        }

        const zoom = getZoomLink(item);
        if (zoom) {
          const btnZoom = document.createElement('button');
          btnZoom.className = 'btn-zoom';
          btnZoom.textContent = 'Zoom';
          btnZoom.addEventListener('click', (e) => { e.stopPropagation(); window.open(zoom, '_blank', 'noopener,noreferrer'); });
          actions.appendChild(btnZoom);
        }

        block.appendChild(actions);
        col.appendChild(block);
      });

      colsWrap.appendChild(col);
    });

    gridWrap.appendChild(colsWrap);
    dayDiv.appendChild(gridWrap);
    tl.appendChild(dayDiv);
  });
}

function render(preserveScroll) {
  const scrollY = preserveScroll ? window.scrollY : 0;
  const filters = getActiveFilters();
  renderFilterTags();
  const conflicts = getConflicts();

  let items = currentView === 'schedule'
    ? DATA.filter(d => mySchedule.has(d.id))
    : DATA;

  items = items.filter(d => matchesFilters(d, filters));
  items.sort((a, b) => sortKey(a).localeCompare(sortKey(b)));

  const container = document.getElementById('cardContainer');
  while (container.firstChild) container.removeChild(container.firstChild);

  const tlContainer = document.getElementById('timelineContainer');

  document.getElementById('scheduleCount').textContent = mySchedule.size;
  document.getElementById('resultCount').textContent =
    items.length + ' session' + (items.length !== 1 ? 's' : '') +
    (currentView === 'schedule' ? ' in your schedule' : ' found');

  if (items.length === 0) {
    tlContainer.style.display = 'none';
    const empty = document.createElement('div');
    empty.className = 'empty';
    const p = document.createElement('p');
    p.textContent = currentView === 'schedule' ? 'Your schedule is empty. Add sessions from the All Sessions view.' : 'No sessions match your filters.';
    empty.appendChild(p);
    container.appendChild(empty);
    return;
  }

  // Show timeline only in schedule view
  if (currentView === 'schedule') {
    renderTimeline(items, conflicts);
  } else {
    tlContainer.style.display = 'none';
  }

  let lastDate = '';
  items.forEach(item => {
    if (item.date !== lastDate) {
      lastDate = item.date;
      const sep = document.createElement('div');
      sep.className = 'day-separator';
      sep.textContent = DAY_NAMES[item.date] || item.date;
      container.appendChild(sep);
    }
    container.appendChild(createCard(item, conflicts));
  });

  saveState();
  if (preserveScroll) requestAnimationFrame(() => window.scrollTo(0, scrollY));
}

// ==================== ICS EXPORT ====================
function formatIcsDate(dateStr, timeStr) {
  // dateStr: "2026-04-09", timeStr: "9:05 AM"
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return '';
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const d = dateStr.replace(/-/g, '');
  return d + 'T' + String(h).padStart(2,'0') + String(min).padStart(2,'0') + '00';
}

function addMinutesToIcsDate(icsDate, minutes) {
  const y = parseInt(icsDate.substring(0,4));
  const mo = parseInt(icsDate.substring(4,6)) - 1;
  const d = parseInt(icsDate.substring(6,8));
  const h = parseInt(icsDate.substring(9,11));
  const mi = parseInt(icsDate.substring(11,13));
  const dt = new Date(y, mo, d, h, mi + minutes);
  const pad = n => String(n).padStart(2,'0');
  return dt.getFullYear() + pad(dt.getMonth()+1) + pad(dt.getDate()) + 'T' +
    pad(dt.getHours()) + pad(dt.getMinutes()) + '00';
}

function escIcsText(s) {
  return s.replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');
}

function getExportItems(calendarMode) {
  const filters = getActiveFilters();
  let items;
  if (calendarMode) {
    // Calendar exports always use My Schedule
    if (mySchedule.size === 0) { alert('Your schedule is empty. Please add sessions first.'); return []; }
    items = DATA.filter(d => mySchedule.has(d.id));
  } else {
    items = currentView === 'schedule'
      ? DATA.filter(d => mySchedule.has(d.id))
      : DATA;
  }
  items = items.filter(d => matchesFilters(d, filters));
  items.sort((a, b) => sortKey(a).localeCompare(sortKey(b)));
  return items;
}

function toUtcString(dateStr, timeStr, durationMin) {
  // Convert to a UTC-formatted string for URL params: 20260407T130000Z
  const m = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return '';
  let h = parseInt(m[1]); const mi = parseInt(m[2]); const ap = m[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  // dateStr = "2026-04-09", America/New_York is UTC-4 in April (EDT)
  const dt = new Date(dateStr + 'T' + String(h).padStart(2,'0') + ':' + String(mi).padStart(2,'0') + ':00');
  // EDT offset = +4 hours to get UTC
  const utcMs = dt.getTime() + 4 * 60 * 60 * 1000;
  const start = new Date(utcMs);
  const end = new Date(utcMs + durationMin * 60 * 1000);
  const fmt = d => d.getUTCFullYear() +
    String(d.getUTCMonth()+1).padStart(2,'0') +
    String(d.getUTCDate()).padStart(2,'0') + 'T' +
    String(d.getUTCHours()).padStart(2,'0') +
    String(d.getUTCMinutes()).padStart(2,'0') + '00Z';
  return { start: fmt(start), end: fmt(end) };
}

function exportOutlookWeb() {
  // Download .ics first, then open Outlook Web import page
  exportIcs();
  alert('Your .ics file is downloading.\n\nOutlook Web will open next — go to:\n"Add calendar" → "Upload from file" → select the downloaded .ics file.');
  window.open('https://outlook.office.com/calendar', '_blank', 'noopener,noreferrer');

function exportGoogleCal() {
  const items = getExportItems(true);
  if (items.length === 0) return;
  if (items.length <= 5) {
    // Few events: open Google Calendar directly for each
    items.forEach(d => {
      const times = toUtcString(d.date, d.time, 25);
      const zoom = getZoomLink(d);
      const details = ['Presenters: ' + d.presenters, 'Advisor: ' + d.advisors,
        d.abstract ? 'Abstract: ' + d.abstract : '', zoom ? 'Zoom: ' + zoom : ''].filter(Boolean).join('\n');
      const params = new URLSearchParams({
        action: 'TEMPLATE',
        text: d.title,
        dates: times.start + '/' + times.end,
        location: d.location,
        details: details
      });
      window.open('https://calendar.google.com/calendar/render?' + params.toString(), '_blank', 'noopener,noreferrer');
    });
  } else {
    // Many events: download .ics and open Google Calendar import
    exportIcs();
    alert('Your .ics file is downloading.\n\nGoogle Calendar will open next — go to:\nSettings (gear icon) → "Import & Export" → "Import" → select the downloaded .ics file.');
    window.open('https://calendar.google.com/calendar/r/settings/export', '_blank', 'noopener,noreferrer');
  }
}

function exportIcs() {
  const items = getExportItems(true);
  if (items.length === 0) return;

  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Duke Nicholas School//Symposium Planner//EN',
    'CALSCALE:GREGORIAN',
    'METHOD:PUBLISH',
    'X-WR-CALNAME:Spring Symposium 2026',
    'X-WR-TIMEZONE:America/New_York'
  ];

  items.forEach(d => {
    const dtStart = formatIcsDate(d.date, d.time);
    const dtEnd = addMinutesToIcsDate(dtStart, 25); // 25-min presentation slots
    const zoom = getZoomLink(d);
    const desc = [
      'Presenters: ' + d.presenters,
      'Program: ' + d.program,
      'Advisor: ' + d.advisors,
      d.abstract ? 'Abstract: ' + d.abstract : '',
      zoom ? 'Zoom: ' + zoom : ''
    ].filter(Boolean).join('\\n');

    lines.push('BEGIN:VEVENT');
    lines.push('DTSTART;TZID=America/New_York:' + dtStart);
    lines.push('DTEND;TZID=America/New_York:' + dtEnd);
    lines.push('SUMMARY:' + escIcsText(d.title));
    lines.push('DESCRIPTION:' + escIcsText(desc));
    lines.push('LOCATION:' + escIcsText(d.location));
    if (zoom) lines.push('URL:' + zoom);
    lines.push('UID:symposium2026-' + d.id + '@duke.edu');
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');

  const blob = new Blob([lines.join('\r\n')], {type: 'text/calendar;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'symposium_' + (currentView === 'schedule' ? 'my_schedule' : 'all') + '.ics';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

    document.getElementById('filterTime').value = saved.filters.time || '';

    document.getElementById('filterTime').value = '';
    document.getElementById('filterLocation').value = '';
    document.getElementById('filterPrimary').value = '';
    document.getElementById('filterSecondary').value = '';
    document.getElementById('filterAdvisor').value = '';
    document.getElementById('filterPresenter').value = '';

  document.addEventListener('click', () => calMenu.classList.remove('open'));
  calMenu.addEventListener('click', (e) => e.stopPropagation());
  document.getElementById('btnOutlookWeb').addEventListener('click', () => { calMenu.classList.remove('open'); exportOutlookWeb(); });
  document.getElementById('btnGoogleCal').addEventListener('click', () => { calMenu.classList.remove('open'); exportGoogleCal(); });
  document.getElementById('btnDownloadIcs').addEventListener('click', () => { calMenu.classList.remove('open'); exportIcs(); });
  document.getElementById('btnPrint').addEventListener('click', () => window.print());

  render();

  // Restore scroll position after render
  if (saved?.scrollY) {
    requestAnimationFrame(() => window.scrollTo(0, saved.scrollY));
  }
}

init();
</script>
</body>
</html>
